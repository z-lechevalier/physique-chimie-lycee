<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entraînement — Lire un axe gradué (Exercice 2)</title>
<style>
  :root{ --bleu:#1a3a5c; --or:#c9a23f; --vert:#2e7d52; --gris-l:#e6e1d8; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Source Serif 4',Georgia,serif; color:#1c1a17; background:#f4f1ea; }
  .wrap{ max-width:820px; margin:0 auto; padding:0; }
  iframe{ width:100%; border:none; background:#f4f1ea; display:block; }
  #bilan{ display:none; max-width:760px; margin:24px auto; background:#fff; border:1px solid var(--gris-l); border-radius:8px; padding:22px; text-align:center; }
  #bilan h2{ margin:0 0 14px; color:var(--bleu); font-size:1.15rem; }
  .notes{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  .note{ background:#f4f1ea; border-radius:8px; padding:12px 18px; min-width:150px; }
  .note .v{ font-size:1.7rem; font-weight:700; color:var(--vert); }
  .note .l{ font-size:.85rem; color:#5a5247; }
  .consigne{ font-size:.92rem; color:#5a5247; margin-top:14px; line-height:1.5; }
</style>
</head>
<body>
<div class="wrap">
  <iframe id="cadre" src="q1.html#1" title="Question" scrolling="no"></iframe>

  <div id="bilan">
    <h2>Bilan de l'exercice 2</h2>
    <div class="notes">
      <div class="note"><div class="v" id="b-n1">—</div><div class="l">Note au 1ᵉʳ essai</div></div>
      <div class="note"><div class="v" id="b-n2">—</div><div class="l">Note avec 2 essais</div></div>
    </div>
    <div class="consigne">Tu as terminé l'exercice 2. Reprends ta feuille et vérifie que chaque calcul est <strong>rédigé correctement</strong>. Si une correction reste floue, note ta question pour ton professeur.</div>
  </div>
</div>

<script>
  var QUESTIONS=["q1.html","q2.html","q3.html","q4.html","q5.html","q6.html"];
  var TOTAL=QUESTIONS.length, idx=0, RES=[];
  var cadre=document.getElementById('cadre');

  /* ===== SCORM 1.2 (l'hôte est le SEUL à parler au LMS) ===== */
  var api=null, init=false, nInter=0;
  function findAPI(w){ var n=0; while(w && !w.API && n<12){ if(w.parent && w.parent!==w){w=w.parent;} else break; n++; } return (w&&w.API)?w.API:null; }
  function scormStart(){ try{
    api=findAPI(window); if(!api && window.opener) api=findAPI(window.opener);
    if(api){ api.LMSInitialize(""); init=true;
      api.LMSSetValue("cmi.core.score.min","0"); api.LMSSetValue("cmi.core.score.max","10");
      api.LMSSetValue("cmi.core.score.raw","0"); api.LMSSetValue("cmi.core.lesson_status","incomplete"); api.LMSCommit(""); }
  }catch(e){} }
  function scormInter(num, note, nb){ try{ if(!init) return;
    var p="cmi.interactions."+nInter+".";
    api.LMSSetValue(p+"id","exo1_q"+(num+1)); api.LMSSetValue(p+"type","performance");
    api.LMSSetValue(p+"result",(nb>0&&note===nb)?"correct":(note>0?"neutral":"wrong")); api.LMSSetValue(p+"weighting","1");
    var o="cmi.objectives."+nInter+".";
    api.LMSSetValue(o+"id","exo1_q"+(num+1)); api.LMSSetValue(o+"score.min","0");
    api.LMSSetValue(o+"score.max",String(nb||1)); api.LMSSetValue(o+"score.raw",String(note));
    nInter++; api.LMSCommit("");
  }catch(e){} }
  function scormFinal(n10){ try{ if(!init) return;
    api.LMSSetValue("cmi.core.score.raw",String(n10)); api.LMSSetValue("cmi.core.lesson_status","completed"); api.LMSCommit("");
  }catch(e){} }
  function scormEnd(){ try{ if(init){ api.LMSFinish(""); init=false; } }catch(e){} }
  window.addEventListener("beforeunload",scormEnd); window.addEventListener("unload",scormEnd);

  /* ===== Auto-hauteur de l'iframe (même origine) ===== */
  function ajuste(){ try{ var d=cadre.contentDocument; if(d&&d.body){ var h=Math.max(d.body.scrollHeight,d.documentElement.scrollHeight); if(h>0) cadre.style.height=(h+8)+'px'; } }catch(e){} }
  setInterval(ajuste,350);
  cadre.addEventListener('load',function(){ setTimeout(ajuste,60); setTimeout(ajuste,400); });

  /* lit le score de la question courante DIRECTEMENT dans l'iframe (même origine, fiable) */
  function lireScore(){ try{ if(cadre.contentWindow && typeof cadre.contentWindow.__score==='function') return cadre.contentWindow.__score(); }catch(e){} return {n1:0,n2:0,nb:0,fini:false}; }

  /* appelé par le bouton situé SOUS le bilan de chaque question */
  window.allerSuivante=function(){
    var sc=lireScore();
    if(!RES[idx]){ RES[idx]={n1:sc.n1,n2:sc.n2,nb:sc.nb||1}; scormInter(idx,sc.n1,sc.nb||1); }
    if(idx<TOTAL-1){ idx++; cadre.src=QUESTIONS[idx]+'#'+(idx+1); window.scrollTo(0,0); }
    else { bilanFinal(); }
  };

  function note10(key){ var s=0; for(var i=0;i<RES.length;i++){ if(RES[i]&&RES[i].nb>0) s+=RES[i][key]/RES[i].nb; } return Math.round((s/TOTAL*10)*10)/10; }
  function bilanFinal(){
    var n1=note10('n1'), n2=note10('n2');
    document.getElementById('b-n1').textContent=String(n1).replace('.',',')+' / 10';
    document.getElementById('b-n2').textContent=String(n2).replace('.',',')+' / 10';
    cadre.style.display='none';
    document.getElementById('bilan').style.display='block';
    scormFinal(n1); window.scrollTo(0,0);
  }

  scormStart();
</script>
</body>
</html>
